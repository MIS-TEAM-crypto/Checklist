<script>
// CONFIG
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwL62TE0xjATWJrU0inh2yrNCHWdJ4EbJCMM-N9zU7tWw5FyyZUwQm7zVgFXyTow20e/exec';

// STORE
let doers = [];
let tasks = [];
let editTaskRow = null;
let editDoerRow = null;
let waPhone = '';

// API
async function apiGet(action){
  const res = await fetch(GAS_URL + '?action=' + action);
  return res.json();
}
async function apiPost(action,data){
  const res = await fetch(GAS_URL,{
    method:'POST',
    body: JSON.stringify({action,data})
  });
  return res.json();
}

// NORMALIZE
function normalizeTask(r){
  return {
    _row: r._row,
    task: r.task,
    doerName: r.doerName,
    department: r.department,
    frequency: r.frequency,
    daydate: r.daydate,
    status: r.status
  };
}
function normalizeDoer(r){
  return {
    _row: r._row,
    name: r.name,
    department: r.department,
    email: r.email,
    phone: r.phone
  };
}

// SYNC
async function syncAll(){
  const res = await apiGet('getAllData');
  doers = res.doers.map(normalizeDoer);
  tasks = res.tasks.map(normalizeTask);
  renderTasks();
  renderDoers();
  populateDoerSelect();
}

// ───────── TASK RENDER ─────────
function renderTasks(){
  const tbody = document.getElementById('task-tbody');
  if(!tasks.length){
    tbody.innerHTML = `<tr><td colspan="7">No Data</td></tr>`;
    return;
  }

  tbody.innerHTML = tasks.map(t=>{
    const d = doers.find(x=>x.name===t.doerName)||{};
    return `<tr>
      <td>${t.task}</td>
      <td>${t.doerName}</td>
      <td>${t.department}</td>
      <td>${t.frequency}</td>
      <td>${t.daydate}</td>
      <td>${t.status}</td>
      <td>
        <button onclick="editTask(${t._row})">Edit</button>
        <button onclick="deleteTask(${t._row})">Del</button>
        ${d.phone?`<button onclick="openWA('${t.task}','${t.doerName}','${d.phone}','${t.frequency}')">WA</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

// ───────── DOER RENDER ─────────
function renderDoers(){
  const tbody = document.getElementById('doer-tbody');
  tbody.innerHTML = doers.map(d=>`
    <tr>
      <td>${d.name}</td>
      <td>${d.department}</td>
      <td>${d.email||''}</td>
      <td>${d.phone||''}</td>
      <td>
        <button onclick="editDoer(${d._row})">Edit</button>
        <button onclick="deleteDoer(${d._row})">Del</button>
      </td>
    </tr>
  `).join('');
}

// ───────── ADD TASK ─────────
async function saveTask(){
  const data = {
    task: document.getElementById('t-task').value,
    doerName: document.getElementById('t-doer').value,
    department: document.getElementById('t-dept').value,
    frequency: document.getElementById('t-freq').value,
    daydate: document.getElementById('t-day').value,
    status: document.getElementById('t-status').value
  };
  await apiPost('addTask',data);
  syncAll();
}

// ───────── EDIT TASK ─────────
function editTask(row){
  const t = tasks.find(x=>x._row==row);
  editTaskRow = row;
  document.getElementById('et-task').value = t.task;
  document.getElementById('et-day').value = t.daydate;
  document.getElementById('edit-task-modal').classList.add('open');
}

async function updateTask(){
  const t = tasks.find(x=>x._row==editTaskRow);
  const data = {
    _row: editTaskRow,
    task: document.getElementById('et-task').value,
    doerName: t.doerName,
    department: t.department,
    frequency: t.frequency,
    daydate: document.getElementById('et-day').value,
    status: t.status
  };
  await apiPost('updateTask',data);
  closeEditTask();
  syncAll();
}

// ───────── DELETE TASK ─────────
async function deleteTask(row){
  if(!confirm('Delete?')) return;
  await apiPost('deleteTask',{_row:row});
  syncAll();
}

// ───────── ADD DOER ─────────
async function saveDoer(){
  const data = {
    name: document.getElementById('f-name').value,
    department: document.getElementById('f-dept').value,
    email: document.getElementById('f-email').value,
    phone: document.getElementById('f-phone').value
  };
  await apiPost('addDoer',data);
  syncAll();
}

// ───────── DELETE DOER ─────────
async function deleteDoer(row){
  if(!confirm('Delete?')) return;
  await apiPost('deleteDoer',{_row:row});
  syncAll();
}

// ───────── DOER SELECT ─────────
function populateDoerSelect(){
  const sel = document.getElementById('t-doer');
  sel.innerHTML = doers.map(d=>`<option>${d.name}</option>`).join('');
}

// ───────── WHATSAPP ─────────
function openWA(task,name,phone,freq){
  const msg = encodeURIComponent(`Hello ${name}, Task: ${task}`);
  window.open(`https://web.whatsapp.com/send?phone=${phone}&text=${msg}`);
}

// INIT
syncAll();
</script>
