<!DOCTYPE html>
<html>
<head>
  <title>DoerDesk</title>
  <style>
    body{font-family:Arial;padding:20px;background:#f5f5f5;}
    h2{margin-top:30px;}
    table{width:100%;border-collapse:collapse;background:#fff;}
    th,td{padding:10px;border:1px solid #ddd;text-align:left;}
    button{padding:5px 10px;margin:2px;cursor:pointer;}
    input,select{padding:6px;margin:4px;}
  </style>
</head>

<body>

<h1>DoerDesk</h1>

<!-- ADD DOER -->
<h2>Add Doer</h2>
<input id="d-name" placeholder="Name">
<input id="d-dept" placeholder="Department">
<input id="d-email" placeholder="Email">
<input id="d-phone" placeholder="Phone">
<button onclick="addDoer()">Add Doer</button>

<!-- DOER LIST -->
<h2>Doer List</h2>
<table>
<thead>
<tr><th>Name</th><th>Dept</th><th>Email</th><th>Phone</th><th>Action</th></tr>
</thead>
<tbody id="doerTable"></tbody>
</table>

<!-- ADD TASK -->
<h2>Add Task</h2>
<input id="t-task" placeholder="Task">
<select id="t-doer"></select>
<input id="t-dept" placeholder="Dept">
<input id="t-freq" placeholder="Freq">
<input id="t-day" placeholder="Day/Date">
<select id="t-status">
<option>Pending</option>
<option>Done</option>
</select>
<button onclick="addTask()">Add Task</button>

<!-- TASK LIST -->
<h2>Task List</h2>
<table>
<thead>
<tr><th>Task</th><th>Doer</th><th>Dept</th><th>Freq</th><th>Day</th><th>Status</th><th>Action</th></tr>
</thead>
<tbody id="taskTable"></tbody>
</table>

<script>
// 🔴 PUT YOUR GAS URL HERE
const GAS_URL = "https://script.google.com/macros/s/AKfycbwL62TE0xjATWJrU0inh2yrNCHWdJ4EbJCMM-N9zU7tWw5FyyZUwQm7zVgFXyTow20e/exec";

// STORE
let doers=[], tasks=[];

// API
async function getData(){
  const res = await fetch(GAS_URL+"?action=getAllData");
  const data = await res.json();
  doers = data.doers;
  tasks = data.tasks;
  render();
}

// RENDER
function render(){
  // DOERS
  document.getElementById('doerTable').innerHTML = doers.map(d=>`
    <tr>
      <td>${d.name}</td>
      <td>${d.department}</td>
      <td>${d.email||''}</td>
      <td>${d.phone||''}</td>
      <td>
        <button onclick="deleteDoer(${d._row})">Delete</button>
      </td>
    </tr>
  `).join('');

  // DROPDOWN
  document.getElementById('t-doer').innerHTML =
    doers.map(d=>`<option>${d.name}</option>`).join('');

  // TASKS
  document.getElementById('taskTable').innerHTML = tasks.map(t=>`
    <tr>
      <td>${t.task}</td>
      <td>${t.doerName}</td>
      <td>${t.department}</td>
      <td>${t.frequency}</td>
      <td>${t.daydate}</td>
      <td>${t.status}</td>
      <td>
        <button onclick="deleteTask(${t._row})">Delete</button>
        <button onclick="sendWA('${t.doerName}','${t.task}')">WA</button>
      </td>
    </tr>
  `).join('');
}

// ADD DOER
async function addDoer(){
  const data={
    name: d-name.value,
    department: d-dept.value,
    email: d-email.value,
    phone: d-phone.value
  };
  await fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({action:"addDoer",data})
  });
  getData();
}

// DELETE DOER
async function deleteDoer(row){
  await fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({action:"deleteDoer",data:{_row:row}})
  });
  getData();
}

// ADD TASK
async function addTask(){
  const data={
    task: t-task.value,
    doerName: t-doer.value,
    department: t-dept.value,
    frequency: t-freq.value,
    daydate: t-day.value,
    status: t-status.value
  };
  await fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({action:"addTask",data})
  });
  getData();
}

// DELETE TASK
async function deleteTask(row){
  await fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({action:"deleteTask",data:{_row:row}})
  });
  getData();
}

// WHATSAPP
function sendWA(name,task){
  const msg = encodeURIComponent(`Hello ${name}, please complete task: ${task}`);
  window.open(`https://wa.me/?text=${msg}`);
}

// INIT
getData();
</script>

</body>
</html>
